<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>tosijs-3d</title>
    <link rel="icon" type="image/svg+xml" href="./static/favicon.svg" />
    <link
      rel="apple-touch-icon"
      type="image/svg+xml"
      href="./static/favicon.svg"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 8px 16px;
        background: #222;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      header a {
        color: #8cf;
        font-size: 14px;
      }
      .preview {
        flex: 1;
        position: relative;
      }
      tosi-b3d {
        width: 100%;
        height: 100%;
      }
    </style>
    <script type="module" src="./dist/demo.js"></script>
    <style>
      #debug-overlay {
        position: fixed;
        top: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.5);
        color: #eee;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        z-index: 100;
        user-select: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #debug-overlay label {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      #debug-overlay input[type='range'] {
        width: 100px;
      }
      #debug-overlay span {
        font-family: monospace;
        min-width: 3.5em;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <header></header>
    <section class="preview"></section>
  </body>
</html>
